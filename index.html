        { question: "John Locke yang mengatakan bahwa pengalaman merupakan sumber pengetahuan, termasuk penganut aliran", options: ["A. Empirisme", "B. Idealisme", "C. Humanisme", "D. Rasionalisme"], correctAnswer: 0 },
        { question: "Dua aliran filsafat ini sama-sama mengemukakan pentingnya pemerolehan pengetahuan secara aktif, baik melalui pengamatan maupun komunikasi. Aliran tersebut adalah....", options: ["A. Empirisme dan Kritisisme", "B. Kritisisme dan Rasionalisme", "C. Konstruktivisme dan Kritisisme", "D. Empirisme dan Konstruktivisme"], correctAnswer: 3 },
        { question: "Salah satu contoh perkembangan Konstruktivisme Kritis dari Konstruktivisme Sosial adalah....", options: ["A. belajar dilakukan melalui interaksinya dengan lingkungan sosial ataupun fisik seseorang", "B. menumbuhkan penalaran anak melalui mekanisme asimilasi, akomodasi, dan ekuilibrium", "C. upaya merangsang peserta didik menggunakan teknik yang lebih kritis dalam menerapkan konsep yang bermakna bagi dirinya", "D. pembangunan pengetahuan anak melalui beragam jalur seperti membaca, bertanya, menelusuri, dan melakukan eksperimen"], correctAnswer: 2 },
        { question: "Cabang Filsafat yang membahas sumber dan dasar pengetahuan adalah...", options: ["A. Epistemologi", "B. Etika", "C. Logika", "D. Metafisika"], correctAnswer: 0 },

        { question: "Peneliti yang memilih untuk tidak melakukan penelitian tentang pengaruh pemberian obat terlarang kepada siswa adalah peneliti yang menerapkan kajian apa dalam filsafat ilmu?", options: ["A. Ontologi", "B. Aksiologi", "C. Epistemologi", "D. Pendidikan"], correctAnswer: 1 },

    ];

    let quizData = [];
    let currentQuestionIndex = 0;
    let userAnswers = []; 
    let checkedStatus = []; 

    const questionEl = document.getElementById('question');
    const optionsEl = document.getElementById('options');
    const progressEl = document.getElementById('progress-text');
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');
    const btnCheck = document.getElementById('btn-check');
    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');
    const scoreEl = document.getElementById('score');

    // --- FUNGSI MENGACAK URUTAN SOAL ---
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function initQuiz() {
        quizData = [...originalQuestions]; 
        
        // Memanggil fungsi pengacak urutan soal sebelum kuis dimulai
        shuffleArray(quizData);
        
        userAnswers = new Array(quizData.length).fill(null);
        checkedStatus = new Array(quizData.length).fill(false);
        currentQuestionIndex = 0;
        quizScreen.style.display = 'block';
        resultScreen.style.display = 'none';
        loadQuestion();
    }

    function loadQuestion() {
        const currentData = quizData[currentQuestionIndex];
        
        // Menambahkan nomor urut di awal teks pertanyaan agar dinamis mengikuti urutan terbaru
        questionEl.innerText = `${currentQuestionIndex + 1}. ${currentData.question}`;
        progressEl.innerText = `Soal ${currentQuestionIndex + 1} dari ${quizData.length}`;
        optionsEl.innerHTML = '';

        currentData.options.forEach((optionText, index) => {
            const div = document.createElement('div');
            div.classList.add('option');
            
            // Script ini akan memisahkan "A.", "B.", dll dengan teks utamanya
            // supaya CSS .option-label tetap mewarnai huruf abjad dengan sempurna!
            const dotIndex = optionText.indexOf('.');
            
            const labelSpan = document.createElement('span');
            labelSpan.classList.add('option-label');
            labelSpan.innerText = optionText.substring(0, dotIndex + 1); // Hasil: "A."
            
            const textSpan = document.createElement('span');
            textSpan.innerText = optionText.substring(dotIndex + 1).trim(); // Hasil: "Teks jawaban..."
            
            // Memasukkan label dan teks ke dalam div opsi
            div.appendChild(labelSpan);
            div.appendChild(textSpan);
            
            if (userAnswers[currentQuestionIndex] === index) {
                div.classList.add('selected');
            }

            if (checkedStatus[currentQuestionIndex]) {
                div.style.pointerEvents = 'none'; 
                if (index === currentData.correctAnswer) {
                    div.classList.add('correct');
                } else if (userAnswers[currentQuestionIndex] === index) {
                    div.classList.add('wrong');
                }
            } else {
                div.addEventListener('click', () => selectOption(index));
            }

            optionsEl.appendChild(div);
        });

        updateButtons();
    }

    function selectOption(selectedIndex) {
        if (checkedStatus[currentQuestionIndex]) return; 

        userAnswers[currentQuestionIndex] = selectedIndex;
        
        const options = optionsEl.children;
        for (let i = 0; i < options.length; i++) {
            options[i].classList.remove('selected');
        }
        
        options[selectedIndex].classList.add('selected');
        updateButtons();
    }

    function checkAnswer() {
        if (userAnswers[currentQuestionIndex] === null) {
            alert("Pilih jawaban yang paling comel dulu ya! 🎀");
            return;
        }

        checkedStatus[currentQuestionIndex] = true;
        const currentData = quizData[currentQuestionIndex];
        const options = optionsEl.children;

        for (let i = 0; i < options.length; i++) {
            options[i].style.pointerEvents = 'none';
            if (i === currentData.correctAnswer) {
                options[i].classList.add('correct');
                options[i].classList.remove('selected');
            } else if (i === userAnswers[currentQuestionIndex]) {
                options[i].classList.add('wrong');
                options[i].classList.remove('selected');
            }
        }
        updateButtons();
    }

    function updateButtons() {
        btnPrev.disabled = currentQuestionIndex === 0;
        btnCheck.disabled = userAnswers[currentQuestionIndex] === null || checkedStatus[currentQuestionIndex];

        if (currentQuestionIndex === quizData.length - 1) {
            btnNext.innerText = "Selesai 💖";
        } else {
            btnNext.innerText = "Selanjutnya 🎀";
        }
    }

    function prevQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            loadQuestion();
        }
    }

    function nextQuestion() {
        if (currentQuestionIndex < quizData.length - 1) {
            currentQuestionIndex++;
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        quizScreen.style.display = 'none';
        resultScreen.style.display = 'block';

        let score = 0;
        for (let i = 0; i < quizData.length; i++) {
            if (userAnswers[i] === quizData[i].correctAnswer) {
                score++;
            }
        }

        scoreEl.innerText = `Skor Kamu: ${score} / ${quizData.length}`;
    }

    function retakeQuiz() {
        window.scrollTo({top: 0, behavior: 'smooth'});
        initQuiz(); 
    }

    initQuiz();
</script>

</body>
</html>
